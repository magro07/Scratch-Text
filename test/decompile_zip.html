<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Decompile zip round-trip test</title>
<style>body { font-family: monospace; font-size: 11px; white-space: pre; padding: 8px; }</style>
</head>
<body>
<div id="out">running...</div>

<script src="../vendor/jszip.min.js"></script>
<script src="../src/md5.js"></script>
<script src="../src/blocks.js"></script>
<script src="../src/parser.js"></script>
<script src="../src/compile.js"></script>
<script src="../src/decompile.js"></script>
<script src="../src/sb3.js"></script>
<script>
const out = document.getElementById('out');
const lines = [];
let pass = 0, fail = 0;
function check(name, cond, detail) {
  if (cond) { pass++; lines.push('PASS ' + name); }
  else      { fail++; lines.push('FAIL ' + name + (detail ? ' ' + detail : '')); }
}
function finish() {
  lines.unshift('=== ' + pass + ' PASS, ' + fail + ' FAIL ===');
  out.textContent = lines.join('\n');
}

(async () => {
  try {
    const src = [
      'sprite Player',
      '    costume Face',
      '        canvas (64) (64)',
      '        circle (32) (32) (28) [#ffcc66 c]',
      '    when flag clicked',
      '        say [Hello!] for (2) seconds',
      '        move (10) steps',
    ].join('\n');

    // Full pipeline: text -> compile -> .sb3 blob -> reload zip -> decompile.
    const project = COMPILE.compile(PARSER.parseProgram(src).program);
    const blob = await SB3.buildSb3(project);
    const buf = await blob.arrayBuffer();
    const zip = await JSZip.loadAsync(buf);

    const projectJson = JSON.parse(await zip.file('project.json').async('string'));
    check('project.json present', !!projectJson && Array.isArray(projectJson.targets));

    // Asset store keyed by md5ext, like app.js builds on load.
    const assets = {};
    for (const name of Object.keys(zip.files)) {
      if (name === 'project.json' || zip.files[name].dir) continue;
      assets[name] = await zip.files[name].async('uint8array');
    }
    check('costume asset stored', Object.keys(assets).length >= 1, JSON.stringify(Object.keys(assets)));

    const text = DECOMPILE.decompile(projectJson);
    check('decompile references costume by md5ext',
          /costume Face from "[0-9a-f]{32}\.svg"/.test(text), '\n' + text);
    check('decompile has the script', text.indexOf('say [Hello!] for (2) seconds') >= 0, '\n' + text);

    // Reparse the decompiled text; the `from` path resolves via the asset store.
    const re = PARSER.parseProgram(text);
    check('reparse no errors', re.errors.length === 0, JSON.stringify(re.errors) + '\n' + text);

    const rebuilt = COMPILE.compile(re.program);
    const out2 = await SB3.buildSb3(rebuilt, { resolveAsset: p => assets[p] });
    const zip2 = await JSZip.loadAsync(await out2.arrayBuffer());
    const json2 = JSON.parse(await zip2.file('project.json').async('string'));
    const player = json2.targets.find(t => t.name === 'Player');
    check('re-exported sprite present', !!player);
    check('re-exported costume keeps original art',
          player && player.costumes[0] && player.costumes[0].name === 'Face' &&
          assets[player.costumes[0].md5ext] !== undefined,
          JSON.stringify(player && player.costumes));

    finish();
  } catch (e) {
    lines.push('EXCEPTION: ' + e.message + '\n' + e.stack);
    fail++;
    finish();
  }
})();
</script>
</body>
</html>
