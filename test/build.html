<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Build test (sync)</title>
<style>body { font-family: monospace; font-size: 11px; white-space: pre; padding: 8px; }</style>
</head>
<body>
<div id="out">...</div>
<script src="../src/md5.js"></script>
<script src="../src/blocks.js"></script>
<script src="../src/parser.js"></script>
<script src="../src/compile.js"></script>
<script src="../src/sb3.js"></script>
<script>
const out = document.getElementById('out');
const lines = [];
let pass = 0, fail = 0;
function check(name, cond, detail) {
  if (cond) { pass++; lines.push('PASS ' + name + (detail ? ' ' + detail : '')); }
  else      { fail++; lines.push('FAIL ' + name + (detail ? ' ' + detail : '')); }
}

try {
  const sample = [
    'character Cat',
    'costume CatFace',
    'when flag clicked',
    'say [Hello!] for (2) seconds',
    'set [score v] to (0)',
    'broadcast [start v]',
    'add [apple] to [items v]',
    'erase all',
    'pen down',
    'set pen color to [#00ff00 c]',
    'set pen size to (3)',
    'forever',
    '    move (10) steps',
    '    if on edge, bounce',
    '    change [score v] by (1)',
    '    if <touching color [#ff0000 c]?> then',
    '        say [red]',
    '    end',
    'end',
    '',
    'character Dog',
    'costume DogFace',
    'when flag clicked',
    'say [Dog here]',
  ].join('\n');

  const { program, errors } = PARSER.parseProgram(sample);
  check('no parse errors', errors.length === 0, JSON.stringify(errors));
  const project = COMPILE.compile(program);

  // Attach assets synchronously (this mutates the project in place).
  const { assets } = SB3.attachAssets(project);
  // Every costume is a default placeholder now. The two sprites share the same
  // placeholder (dedup by hash), plus the Stage's default backdrop = 2 assets.
  check('2 placeholder assets produced', assets.length === 2, 'got ' + assets.length);
  check('stage has costume', project.targets[0].costumes.length === 1);
  const spriteTargets = project.targets.filter(t => !t.isStage);
  check('sprites exported', spriteTargets.length === 2, 'got ' + spriteTargets.length);
  check('all sprites have costume', spriteTargets.every(t => t.costumes.length === 1));
  check('custom costume names exported',
        spriteTargets[0].costumes[0].name === 'CatFace' && spriteTargets[1].costumes[0].name === 'DogFace');

  const c0 = project.targets[0].costumes[0];
  const c1 = spriteTargets[0].costumes[0];
  check('stage md5ext shape', /^[0-9a-f]{32}\.svg$/.test(c0.md5ext), c0.md5ext);
  check('sprite md5ext shape', /^[0-9a-f]{32}\.svg$/.test(c1.md5ext), c1.md5ext);
  check('assetId matches md5ext', c0.assetId + '.svg' === c0.md5ext);

  // Asset bytes must actually hash to the referenced assetId.
  const stageBytes = assets[0].data;
  const spriteBytes = assets[1].data;
  check('asset[0] name matches hash', assets[0].name === MD5.md5Bytes(stageBytes) + '.svg');
  check('asset[1] name matches hash', assets[1].name === MD5.md5Bytes(spriteBytes) + '.svg');

  // project.json must be JSON.stringify-round-trippable with no undefined leaks.
  const json = JSON.stringify(project);
  const round = JSON.parse(json);
  check('json round-trip', round.targets.length === 3);
  check('no undefined values', !/\"undefined\"|:\s*undefined/.test(json));
  check('round-trip keeps list', Object.values(round.targets[0].lists).some(v => v[0] === 'items'));
  check('round-trip keeps broadcast', Object.values(round.targets[0].broadcasts).indexOf('start') >= 0);
  check('round-trip keeps pen extension', round.extensions.indexOf('pen') >= 0);

  // Sanity-check block linking: every non-topLevel block has a parent that exists.
  let linkOk = true, linkBad = '';
  for (const sprite of spriteTargets) {
    for (const id of Object.keys(sprite.blocks)) {
      const b = sprite.blocks[id];
      if (!b.topLevel && b.parent !== null && !sprite.blocks[b.parent]) {
        linkOk = false; linkBad = `${sprite.name}:${id} -> ${b.parent}`; break;
      }
    }
    if (!linkOk) break;
  }
  check('all block parents resolve', linkOk, linkBad);

  // Every `next` reference, if set, must resolve.
  let nextOk = true, nextBad = '';
  for (const sprite of spriteTargets) {
    for (const id of Object.keys(sprite.blocks)) {
      const b = sprite.blocks[id];
      if (b.next !== null && !sprite.blocks[b.next]) { nextOk = false; nextBad = `${sprite.name}:${id} -> ${b.next}`; break; }
    }
    if (!nextOk) break;
  }
  check('all next pointers resolve', nextOk, nextBad);

  // Every SUBSTACK / CONDITION / NUM1 etc. block reference must resolve.
  let inpOk = true, inpBad = '';
  for (const sprite of spriteTargets) {
    for (const id of Object.keys(sprite.blocks)) {
      const b = sprite.blocks[id];
      for (const inpName of Object.keys(b.inputs)) {
        const v = b.inputs[inpName];
        if (!Array.isArray(v)) continue;
        // v = [type, a, b?]
        for (let k = 1; k < v.length; k++) {
          if (typeof v[k] === 'string') {
            if (!sprite.blocks[v[k]]) { inpOk = false; inpBad = `${sprite.name}:${id}.${inpName} -> ${v[k]}`; break; }
          }
        }
        if (!inpOk) break;
      }
      if (!inpOk) break;
    }
    if (!inpOk) break;
  }
  check('all input references resolve', inpOk, inpBad);

  // External image import (`from "..."`) is disabled in this build: the parser
  // must reject it rather than pulling in files. The user adds the artwork in
  // Scratch after importing the .sb3.
  const externalSample = [
    'stage',
    '    backdrop Sky from "assets/sky.svg"',
    '',
    'sprite Player',
    '    costume Idle from "assets/player.svg"',
    '    when flag clicked',
    '        say [ready]',
  ].join('\n');
  const external = PARSER.parseProgram(externalSample);
  check('external image import is rejected',
        external.errors.length >= 2 && external.errors.every(e => /disabled in this build/i.test(e.msg)),
        JSON.stringify(external.errors));
} catch (e) {
  lines.push('EXCEPTION: ' + e.message);
  fail++;
}

lines.unshift('=== ' + pass + ' PASS, ' + fail + ' FAIL ===');
out.textContent = lines.join('\n');
</script>
</body>
</html>
